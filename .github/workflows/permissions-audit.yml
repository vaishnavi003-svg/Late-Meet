name: Permissions Audit

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "src/manifest.json"

permissions:
  contents: read
  pull-requests: write

jobs:
  permissions-audit:
    name: Chrome Extension Permissions Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          path: pr

      - name: Checkout Base Branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Compare Permissions
        id: compare
        run: |
          set -euo pipefail

          PR_MANIFEST="pr/src/manifest.json"
          BASE_MANIFEST="base/src/manifest.json"

          DANGEROUS_PERMS=("debugger" "webRequest" "webRequestBlocking" "proxy" "nativeMessaging" "management")
          DANGEROUS_HOSTS=("<all_urls>" "*://*/*" "http://*/*" "https://*/*")

          {
            echo "## 🔒 Chrome Extension Permissions Audit"
            echo ""
          } > audit_report.md

          ISSUES=0

          # Compare permissions arrays
          PR_PERMS=$(jq -r '.permissions // [] | sort | .[]' "$PR_MANIFEST" 2>/dev/null)
          BASE_PERMS=$(jq -r '.permissions // [] | sort | .[]' "$BASE_MANIFEST" 2>/dev/null)

          ADDED_PERMS=$(comm -23 <(echo "$PR_PERMS") <(echo "$BASE_PERMS") 2>/dev/null || true)
          REMOVED_PERMS=$(comm -13 <(echo "$PR_PERMS") <(echo "$BASE_PERMS") 2>/dev/null || true)

          if [ -n "$ADDED_PERMS" ]; then
            {
              echo "### ⚠️ New Permissions Added"
              echo '```'
              echo "$ADDED_PERMS"
              echo '```'
              echo ""
            } >> audit_report.md

            for perm in $ADDED_PERMS; do
              for dangerous in "${DANGEROUS_PERMS[@]}"; do
                if [ "$perm" = "$dangerous" ]; then
                  echo "🚨 **DANGEROUS PERMISSION:** \`$perm\` requires security review!" >> audit_report.md
                  ISSUES=$((ISSUES + 1))
                fi
              done
            done
          else
            echo "✅ No new permissions added" >> audit_report.md
          fi

          if [ -n "$REMOVED_PERMS" ]; then
            {
              echo ""
              echo "### ✅ Permissions Removed"
              echo '```'
              echo "$REMOVED_PERMS"
              echo '```'
            } >> audit_report.md
          fi

          # Compare host_permissions
          PR_HOSTS=$(jq -r '.host_permissions // [] | sort | .[]' "$PR_MANIFEST" 2>/dev/null)
          BASE_HOSTS=$(jq -r '.host_permissions // [] | sort | .[]' "$BASE_MANIFEST" 2>/dev/null)

          ADDED_HOSTS=$(comm -23 <(echo "$PR_HOSTS") <(echo "$BASE_HOSTS") 2>/dev/null || true)

          if [ -n "$ADDED_HOSTS" ]; then
            {
              echo ""
              echo "### ⚠️ New Host Permissions Added"
              echo '```'
              echo "$ADDED_HOSTS"
              echo '```'
            } >> audit_report.md

            for host in $ADDED_HOSTS; do
              for dangerous_host in "${DANGEROUS_HOSTS[@]}"; do
                if [ "$host" = "$dangerous_host" ]; then
                  echo "🚨 **OVERLY BROAD HOST:** \`$host\` detected!" >> audit_report.md
                  ISSUES=$((ISSUES + 1))
                fi
              done
            done
          fi

          {
            echo ""
            echo "> 🤖 Generated by the Permissions Audit workflow"
          } >> audit_report.md

          echo "issues=$ISSUES" >> "$GITHUB_OUTPUT"

      - name: Post Audit Report
        if: always()
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v2
        with:
          header: permissions-audit
          path: audit_report.md

      - name: Fail on Dangerous Permissions
        if: steps.compare.outputs.issues != '0'
        run: |
          echo "❌ Dangerous permission changes detected — see PR comment for details"
          exit 1
