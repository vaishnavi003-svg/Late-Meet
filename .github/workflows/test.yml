name: Test & Coverage

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests with Coverage
        run: npx c8 --reporter=text --reporter=json-summary --reporter=lcov npm test
        continue-on-error: false

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 14

      - name: Post Coverage Summary
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v2
        continue-on-error: true
        with:
          header: coverage
          message: |
            ## 📊 Test Coverage Report

            <details>
            <summary>Coverage Results</summary>

            ```
            $(npx c8 report --reporter=text 2>/dev/null || echo "Coverage report unavailable")
            ```

            </details>

            > 🤖 Generated by the Test & Coverage workflow
