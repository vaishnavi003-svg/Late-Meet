name: Bundle Budget

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  bundle-budget:
    name: Bundle Budget
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size budget (warns at 1MB)
        run: npm run size-check
