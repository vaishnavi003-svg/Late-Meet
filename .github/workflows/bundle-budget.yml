name: Bundle Budget

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  bundle-budget:
    name: Bundle Budget
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size budget (warns at 1MB)
        run: npm run size-check
