name: Bundle Size Report

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  bundle-size:
    name: Bundle Size Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          path: pr

      - name: Checkout Base Branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pr/package-lock.json

      - name: Build PR Branch
        run: |
          cd pr
          npm ci
          npm run build

      - name: Build Base Branch
        run: |
          cd base
          npm ci
          npm run build
        continue-on-error: true

      - name: Calculate Bundle Sizes
        id: sizes
        run: |
          PR_SIZE=$(du -sb pr/dist 2>/dev/null | cut -f1 || echo "0")
          BASE_SIZE=$(du -sb base/dist 2>/dev/null | cut -f1 || echo "0")
          DIFF=$(("$PR_SIZE" - "$BASE_SIZE"))

          # Human readable
          PR_HR=$(numfmt --to=iec-i --suffix=B "$PR_SIZE" 2>/dev/null || echo "${PR_SIZE}B")
          BASE_HR=$(numfmt --to=iec-i --suffix=B "$BASE_SIZE" 2>/dev/null || echo "${BASE_SIZE}B")

          if [ "$DIFF" -gt 0 ]; then
            DIFF_HR="+$(numfmt --to=iec-i --suffix=B "$DIFF" 2>/dev/null || echo "${DIFF}B")"
            EMOJI="📈"
          elif [ "$DIFF" -lt 0 ]; then
            DIFF_HR="$(numfmt --to=iec-i --suffix=B -- "$DIFF" 2>/dev/null || echo "${DIFF}B")"
            EMOJI="📉"
          else
            DIFF_HR="No change"
            EMOJI="✅"
          fi

          # Check threshold (5MB = 5242880 bytes)
          THRESHOLD=5242880
          WARNING=""
          if [ "$PR_SIZE" -gt "$THRESHOLD" ]; then
            WARNING="⚠️ **Warning:** Extension bundle exceeds 5MB threshold!"
          fi

          cat > bundle_report.md << EOF
          ## 📦 Bundle Size Report

          | Metric | Size |
          |---|---|
          | PR Bundle | $PR_HR |
          | Base Bundle | $BASE_HR |
          | Difference | $EMOJI $DIFF_HR |

          $WARNING

          > 🤖 Generated by the Bundle Size Report workflow
          EOF

      - name: Post Bundle Size Comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v2
        continue-on-error: true
        with:
          header: bundle-size
          path: bundle_report.md
